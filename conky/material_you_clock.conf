conky.config = {
    alignment = 'bottom_right',
    background = false,
    border_width = 0,
    cpu_avg_samples = 2,
    default_color = 'white',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = false,
    draw_outline = false,
    draw_shades = false,
    use_xft = true,
    font = 'Lexend:size=10',
    gap_x = 40,
    gap_y = 40,
    minimum_height = 280,
    minimum_width = 260,
    maximum_width = 260,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_wayland = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'override',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 180, -- Material Surface Opacity
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_colour = '1C1B1F', -- Material Dark Surface
    update_interval = 1.0,
    uppercase = false, -- Material is generally sentence-case or lowercase
    
    -- Material You Color Palette (Dynamic)
    color1 = 'E6E1E5', -- On-Surface (White-ish)
    color2 = '938F99', -- Variant (Grey)
    color3 = 'B60405', -- Primary Accent (Dynamic)
