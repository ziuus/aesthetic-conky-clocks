conky.text = [[
${voffset 20}${alignc}${color3}${font Lexend:style=Bold:size=48}${time %H:%M}${font}
${voffset 5}${alignc}${color1}${font Lexend:style=Medium:size=14}${time %A, %b %d}${font}

${voffset 20}${goto 40}${color3}${font JetBrainsMono Nerd Font:size=16}󰻠${font}${goto 80}${color1}${font Lexend:size=11}CPU${alignr 40}${color3}${cpu}%${font}
${voffset 12}${goto 40}${color3}${font JetBrainsMono Nerd Font:size=16}󰍛${font}${goto 80}${color1}${font Lexend:size=11}RAM${alignr 40}${color3}${memperc}%${font}
${voffset 12}${goto 40}${color3}${font JetBrainsMono Nerd Font:size=16}󰁹${font}${goto 80}${color1}${font Lexend:size=11}BAT${alignr 40}${color3}${battery_percent}%${font}
${voffset 20}
]]
