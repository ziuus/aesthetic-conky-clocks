conky.config = {
    alignment = 'bottom_right',
    background = false,
    border_width = 0,
    cpu_avg_samples = 2,
    default_color = 'white',
    default_outline_color = 'white',
    default_shade_color = 'black',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = false,
    draw_outline = false,
    draw_shades = false,
    use_xft = true,
    font = 'CaskaydiaCove Nerd Font:size=10',
    gap_x = 40,
    gap_y = 40,
    minimum_height = 220,
    minimum_width = 320,
    maximum_width = 320,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_stderr = false,
    out_to_wayland = true,
    extra_newline = false,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'override', -- Pinned to desktop layer
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 160, -- Restored subtle glass
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_colour = '09090B',
    stippled_borders = 0,
    update_interval = 1.0,
    uppercase = true,
    use_spacer = 'none',
    show_graph_scale = false,
    show_graph_range = false,
    
    color1 = 'FFFFFF',
    color2 = 'F43F5E',
    color3 = 'D8E3E6',
    color4 = '3F3F46',
}

conky.text = [[
${voffset 15}${goto 15}${color3}${font :size=16}┌${alignr 15}┐${font}
${voffset 5}${alignc}${color1}${font CaskaydiaCove Nerd Font:style=Bold:size=42}${time %H}:${time %M}${font}
${voffset 8}${alignc}${color2}${font CaskaydiaCove Nerd Font:style=Bold:size=11}${time %A, %d %B %Y}${font}
${voffset 12}${goto 15}${color4}${hr 1}${offset 15}
${voffset 10}${alignc}${font CaskaydiaCove Nerd Font:style=Bold:size=8}${color3}CPU [ ${color1}${cpu}% ${color3}]  MEM [ ${color1}${memperc}% ${color3}]  BAT [ ${color1}${battery_percent}% ${color3}]${font}
${voffset 5}${alignc}${font CaskaydiaCove Nerd Font:style=Bold:size=8}${color3}UP [ ${color1}${uptime_short} ${color3}]  WTR [ ${color1}${execi 1800 curl -s 'wttr.in/?format=%t' | sed 's/+//'}${color3} ]${font}
${voffset 15}${goto 15}${color3}${font :size=16}└${alignr 15}┘${font}${voffset 15}
]]
